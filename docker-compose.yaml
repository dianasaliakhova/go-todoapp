services:
  todoapp-postgres:
    image: postgres:18.1-bookworm
    container_name: todoapp-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    # если контейнер остановится то мы потеряем данные внутри него. Чтобы это избежать, нужно изнутри докер контейнера с посотгресом
    # прокинуть valume себе на локальную машину. Чтобы данные переживали перезагрузку контейнера
    volumes:
    # слева: путь на локальной машине (хосте), справа: папка внутри докер контейнера 
    # /var/lib/postgresql необходимо сохранять между перезапусками контейнера пострегреса
    # PROJECT_ROOT - переменная окружения, которую кладем полный путь до корня проекта
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always
  todoapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations
  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: todoapp-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:todoapp-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"
    
